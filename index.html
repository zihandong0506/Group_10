<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Campus Thrift - Second Hand Market</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        
        <div id="authView">
            <div class="auth-card">
                <h1>Campus Thrift</h1>
                <h2 id="formTitle">Student Login</h2>
                <div class="input-group">
                    <input type="email" id="emailInput" placeholder="School email address" required>
                </div>
                <div class="input-group">
                    <input type="password" id="passwordInput" placeholder="Password" required>
                </div>
                <button id="mainAuthBtn" class="btn btn-primary">Login</button>
                <p class="toggle-text" id="toggleModeBtn">Don't have an account? Sign up</p>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
                <button id="googleLoginBtn" class="btn btn-google">Continue with Google</button>
            </div>
        </div>

        <div id="homeView" class="app-view hidden">
            <div class="top-bar">
                <div class="search-container">
                    <input type="text" class="search-input" placeholder="Search for textbooks, monitors, chairs...">
                </div>
            </div>
            <div class="middle-content">
                <div class="content-container">
                    <div class="product-grid" id="productGrid">
                        <div class="empty-state">Loading items from database...</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="sellView" class="app-view hidden">
            <div class="top-bar">
                <h2 style="margin:0; font-size:18px;">Post a New Item</h2>
            </div>
            <div class="middle-content">
                <div class="content-container">
                    <div class="sell-form-card">
                        <div class="input-group">
                            <label style="display:block; margin-bottom:5px; color:#555; font-size:14px;">Item Title</label>
                            <input type="text" id="postTitle" placeholder="e.g. Calculus Textbook">
                        </div>
                        <div class="input-group">
                            <label style="display:block; margin-bottom:5px; color:#555; font-size:14px;">Price ($)</label>
                            <input type="number" id="postPrice" placeholder="e.g. 15.00" step="0.01">
                        </div>
                        <div class="input-group">
                            <label style="display:block; margin-bottom:5px; color:#555; font-size:14px;">Condition</label>
                            <select id="postCondition">
                                <option value="Brand New">Brand New</option>
                                <option value="Like New">Like New</option>
                                <option value="Used - Good">Used - Good</option>
                                <option value="Used - Fair">Used - Fair</option>
                            </select>
                        </div>
                        <button id="submitPostBtn" class="btn btn-primary" style="margin-top:15px;">Publish Item</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="bottomNav" class="bottom-nav hidden">
            <div class="nav-container">
                <button class="nav-item active" id="navHome">Home</button>
                <button class="nav-item" id="navSell">Sell Item</button>
                <button class="nav-item" id="navProfile">Profile</button>
            </div>
        </div>

    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
