<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Firebase Team Project</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            padding: 40px; 
            background-color: #f4f4f9;
        }
        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 { text-align: center; color: #333; }
        .input-group { margin-bottom: 15px; }
        .input-group input { 
            width: 100%; padding: 10px; box-sizing: border-box; 
            border: 1px solid #ccc; border-radius: 4px; font-size: 16px;
        }
        .btn { 
            width: 100%; padding: 12px; font-size: 16px; cursor: pointer; 
            color: white; border: none; border-radius: 4px; margin-bottom: 10px;
        }
        .btn-primary { background-color: #007bff; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-google { background-color: #4285F4; }
        .btn-google:hover { background-color: #357ae8; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #c82333; }
        .toggle-text { text-align: center; color: #007bff; cursor: pointer; font-size: 14px; }
        .toggle-text:hover { text-decoration: underline; }
        .success-msg { color: #0f9d58; font-weight: bold; background: #e6f4ea; padding: 10px; border-radius: 4px; }
        
        /* CSS class to control view toggling */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Team Database Project</h1>

        <div id="authView">
            <h2 id="formTitle">User Login</h2>
            
            <div class="input-group">
                <input type="email" id="emailInput" placeholder="Enter email address" required>
            </div>
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Enter password (min 6 characters)" required>
            </div>
            
            <button id="mainAuthBtn" class="btn btn-primary">Login</button>
            <p class="toggle-text" id="toggleModeBtn">Don't have an account? Click here to register</p>
            
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            
            <button id="googleLoginBtn" class="btn btn-google">Continue with Google</button>
        </div>

        <div id="successView" class="hidden">
            <h2>🎉 Login Successful!</h2>
            <p class="success-msg">Welcome to the system. Your data has been synchronized.</p>
            <div id="userInfo" style="background: #f8f9fa; padding: 15px; border-radius: 4px; margin-bottom: 20px; word-break: break-all;">
                </div>
            <button id="logoutBtn" class="btn btn-danger">Logout</button>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { 
            getAuth, signInWithPopup, GoogleAuthProvider, 
            createUserWithEmailAndPassword, signInWithEmailAndPassword, 
            onAuthStateChanged, signOut 
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

         const firebaseConfig = {
            apiKey: "AIzaSyC3BrcypGhOEqP9wvu4PnBFlDmTmtKdFXc",
            authDomain: "group-10-570d5.firebaseapp.com",
            projectId: "group-10-570d5",
            storageBucket: "group-10-570d5.firebasestorage.app",
            messagingSenderId: "330776905308",
            appId: "1:330776905308:web:251f0f1584e25925070899"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Get DOM elements
        const authView = document.getElementById('authView');
        const successView = document.getElementById('successView');
        const formTitle = document.getElementById('formTitle');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const mainAuthBtn = document.getElementById('mainAuthBtn');
        const toggleModeBtn = document.getElementById('toggleModeBtn');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userInfoDiv = document.getElementById('userInfo');

        let isLoginMode = true; // Tracks whether current mode is login or register

        // Toggle Login/Register UI
        toggleModeBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                formTitle.innerText = "User Login";
                mainAuthBtn.innerText = "Login";
                toggleModeBtn.innerText = "Don't have an account? Click here to register";
            } else {
                formTitle.innerText = "Create New Account";
                mainAuthBtn.innerText = "Register";
                toggleModeBtn.innerText = "Already have an account? Click here to login";
            }
        });

        // Listen for system-level authentication state changes
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in: hide auth form, show success view
                authView.classList.add('hidden');
                successView.classList.remove('hidden');
                
                // Dynamically inject user data
                userInfoDiv.innerHTML = `
                    <p><strong>Email:</strong> ${user.email || 'Not provided'}</p>
                    <p><strong>UID:</strong> ${user.uid}</p>
                `;
                
                // Ensure user record exists in database
                saveUserToDatabase(user);
            } else {
                // User is signed out: show auth form, hide success view
                authView.classList.remove('hidden');
                successView.classList.add('hidden');
                emailInput.value = '';
                passwordInput.value = '';
            }
        });

        // Function to write data to Firestore
        async function saveUserToDatabase(user) {
            try {
                const userDocRef = doc(db, "users", user.uid);
                await setDoc(userDocRef, {
                    email: user.email,
                    lastLoginTime: new Date().toISOString()
                }, { merge: true });
                console.log("Database record synchronized.");
            } catch (error) {
                console.error("Failed to write to database:", error);
            }
        }

        // 1. Email Register/Login button click event
        mainAuthBtn.addEventListener('click', () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            
            if (!email || !password) {
                alert("Please enter both email and password!");
                return;
            }

            if (isLoginMode) {
                // Execute login
                signInWithEmailAndPassword(auth, email, password)
                    .catch((error) => alert("Login failed: " + error.message));
            } else {
                // Execute registration
                createUserWithEmailAndPassword(auth, email, password)
                    .catch((error) => alert("Registration failed: " + error.message));
            }
        });

        // 2. Google login event
        googleLoginBtn.addEventListener('click', () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider)
                .catch((error) => alert("Google login failed: " + error.message));
        });

        // 3. Logout event
        logoutBtn.addEventListener('click', () => {
            signOut(auth).catch((error) => console.error("Logout failed:", error));
        });
    </script>
</body>
</html>
